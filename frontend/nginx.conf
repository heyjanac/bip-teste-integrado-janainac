server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy das chamadas de API para o backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy do Swagger UI (opcional — acessível em /swagger-ui.html)
    location /swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }

    # Proxy do console H2 (útil em desenvolvimento)
    location /h2-console/ {
        proxy_pass http://backend:8080/h2-console/;
        proxy_set_header Host $host;
    }

    # SPA fallback — todas as rotas Angular são servidas pelo index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Arquivos estáticos com cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

